<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros 14 meses ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 10px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    align-items: flex-start; /* 👈 CLAVE */
    padding-top: 70px; /* 👈 controla posición */
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Quicksand', sans-serif;
}

/* TEXTO */
.nombre {
    width: 100%;
    text-align: center;
    font-size: 24px;
    font-weight: 600;
    color: white;
    margin-bottom: 10px;
}

/* CONTENEDOR */
.container {
    width: 100%;
    display: flex;
    justify-content: center;
    perspective: 1000px;
}

/* TARJETA */
.card {
    width: 88vw;
    height: 70vh;
    max-width: 400px;
    max-height: 520px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s;
    cursor: pointer;
}

.card.open {
    transform: rotateY(180deg);
}

/* LADOS */
.side {
    position: absolute;
    top: 0;      /* 👈 AÑADE ESTO */
    left: 0;     /* 👈 AÑADE ESTO */
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    overflow: hidden;
}

/* ❤️ CORAZÓN ORIGINAL (EL QUE FUNCIONABA) */
.front {
    position: absolute; /* 👈 CLAVE */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    
    display: flex;
    justify-content: center;
    align-items: center;

    background: transparent;
}

.heart-img {
    position: absolute;
    width: 85%;
    height: 85%;
    object-fit: contain;
    animation: latido 1.2s infinite;
}

/* 💓 animación */
@keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* TEXTO CORAZÓN */
.front h2 {
    position: relative;
    z-index: 2;
    color: white;
    font-size: 22px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    text-align: center;
    transform: translateY(-20px);
}

/* INTERIOR */
.back {
    display: flex;
    transform: rotateY(180deg);
    background: white;
}

.left, .right {
    width: 50%;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXTO CARTA */
.right {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 15px; /* 👈 bajamos 2 puntos */
    padding: 15px;
    overflow-y: auto;
    font-family: 'Playfair Display', serif; /* 👈 cursiva elegante */
    font-style: italic;
}

/* corazones flotando */
.heart {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-700px); opacity: 0; }
}
</style>
</head>

<body>

<div class="nombre">Para Mi preciosa ❤️</div>

<audio id="music" src="music.mp3" loop></audio>

<div class="container">
    <div class="card" id="card" onclick="openCard()">
        
        <!-- FRENTE -->
<div class="side front">
    <img src="img/CORAZÓN.png" class="heart-img">
    <h2>💖 Tócame 💖</h2>
</div>

        <!-- INTERIOR -->
        <div class="side back">
            <div class="left">
                <img src="img/nosotros.jpg">
            </div>
            <div class="right">
                <p>
                    Hoy cumplimos 14 meses ❤️<br><br>
                    Y sí… a veces se me olvida decírtelo 🙈<br>
                    (pero nunca sentirlo, tranquila 😏)<br><br>
                    
                    Porque la verdad es que...<br>
                    me tienes completamente enamorado 💕<br><br>
                    
                    Gracias por aguantarme,<br>
                    quererme y hacerme tan feliz 🥹<br><br>
                    
                    Te amo muchísimo ❤️
                </p>
            </div>
        </div>

    </div>
</div>

<script>
let opened = false;

function openCard() {
    if (opened) return;
    opened = true;

    document.getElementById("card").classList.add("open");
    document.getElementById("music").play();

    if (navigator.vibrate) {
        navigator.vibrate([200,100,200]);
    }

    for (let i = 0; i < 25; i++) {
        setTimeout(createHeart, i * 100);
    }
}

window.onload = () => setTimeout(openCard, 1500);

function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";

    h.style.left = Math.random()*window.innerWidth+"px";
    h.style.top = "100%";
    h.style.fontSize = (Math.random()*10+15)+"px";
    h.style.animationDuration = (Math.random()*2+3)+"s";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
}
</script>

</body>
</html>
