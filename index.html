<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestros 14 meses ❤️</title>

<!-- Fuente bonita y legible -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 10px;
    height: 100vh;
    display: flex;
    justify-content: center; /* 👈 centrado real */
    align-items: center;
    flex-direction: column;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: 'Quicksand', sans-serif;
}

/* TEXTO SUPERIOR */
.nombre {
    position: absolute;
    top: 25px;
    font-size: 24px;
    font-weight: 600;
    color: white;
}

/* CONTENEDOR */
.container {
    perspective: 1000px;
    width: 100%;
    display: flex;
    justify-content: center;
}

/* TARJETA */
.card {
    width: 92vw;
    height: 70vh;
    max-width: 420px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s;
    cursor: pointer;
}

.card.open {
    transform: rotateY(180deg);
}

/* LADOS */
.side {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 20px;
    overflow: hidden;
}

/* ❤️ CORAZÓN */
.front {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* imagen corazón */
.front img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    animation: latido 1.2s infinite;
}

/* texto sobre corazón */
.front h2 {
    position: absolute;
    color: white;
    font-size: 24px;
    font-family: 'Dancing Script', cursive; /* 👈 romántico */
    text-align: center;
    transform: translateY(-20px);
}

/* latido */
@keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

/* INTERIOR */
.back {
    display: flex;
    transform: rotateY(180deg);
    background: white;
    border-radius: 20px;
}

.left, .right {
    width: 50%;
}

.left img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TEXTO CARTA */
.right {
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 17px;
    padding: 18px;
    overflow-y: auto;
    font-family: 'Quicksand', sans-serif;
}

/* corazones flotando */
.heart {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-700px); opacity: 0; }
}
</style>
</head>

<body>

<div class="nombre">Para Mi preciosa ❤️</div>

<audio id="music" src="music.mp3" loop></audio>

<div class="container">
    <div class="card" id="card" onclick="openCard()">
        
        <!-- FRENTE -->
        <div class="side front">
            <img src="img/CORAZÓN.png" alt="Corazón">
            <h2>💖 Tócame 💖</h2>
        </div>

        <!-- INTERIOR -->
        <div class="side back">
            <div class="left">
                <img src="img/nosotros.jpg">
            </div>
            <div class="right">
                <p>
                    Hoy cumplimos 14 meses ❤️<br><br>
                    Y sí… a veces se me olvida decírtelo 🙈<br>
                    (pero nunca sentirlo, tranquila 😏)<br><br>
                    
                    Porque la verdad es que...<br>
                    me tienes completamente enamorado 💕<br><br>
                    
                    Gracias por aguantarme,<br>
                    quererme y hacerme tan feliz 🥹<br><br>
                    
                    Te amo muchísimo ❤️
                </p>
            </div>
        </div>

    </div>
</div>

<script>
let opened = false;

function openCard() {
    if (opened) return;
    opened = true;

    document.getElementById("card").classList.add("open");
    document.getElementById("music").play();

    if (navigator.vibrate) {
        navigator.vibrate([200,100,200]);
    }

    for (let i = 0; i < 25; i++) {
        setTimeout(createHeart, i * 100);
    }
}

window.onload = () => setTimeout(openCard, 1500);

function createHeart() {
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";

    h.style.left = Math.random()*window.innerWidth+"px";
    h.style.top = "100%";
    h.style.fontSize = (Math.random()*10+15)+"px";
    h.style.animationDuration = (Math.random()*2+3)+"s";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
}
</script>

</body>
</html>
